# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.

# Main Page Setup

title: Oliver Bilston's Portfolio # This is what shows up in the tab of the browser



# Hero Section
name: Oliver Bilston
headline: 
description: >- # dont remove this line. this will ignore all new lines until the next section
  I'm a final-year Mechanical Engineering and Business Analytics student at Monash University who builds things from scratch. I've designed a custom brushless DC motor from first principles, fabricated a fully autonomous sailing vessel, 
  and certified airworthiness modifications on real aircraft — all before graduating. 
  Outside the lab I lead 130+ engineers as COO of Monash Uncrewed Aerial Systems, one of the largest student engineering teams at Monash. 
  I'm at my best when constraints are tight and the problem hasn't been solved before. Reach out if you'd like to talk


# Place your profile image in /assets/images/profile-image/folder and edit the file name
profile_image: assets/images/profile-image/avatar.jpg


# Link your resume
# You can place your resume in assets/resume/{resume.pdf or add external link such as pdf saved in google drive 
resume-url: /assets/resume/Resume.pdf


